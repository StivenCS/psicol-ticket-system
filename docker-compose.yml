version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: psicol_ticket_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - psicol_ticket_network

  nginx:
    image: nginx:latest
    container_name: psicol_ticket_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - psicol_ticket_network

  mysql:
    image: mysql:8
    container_name: psicol_ticket_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: psicol_ticket_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: psicol_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - psicol_ticket_network

  frontend:
    image: node:24
    container_name: psicol_ticket_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - psicol_ticket_network

networks:
  psicol_ticket_network:

volumes:
  mysql_data: